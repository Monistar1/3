<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a1012"/>
      <stop offset="50%" stop-color="#5a1a20"/>
      <stop offset="100%" stop-color="#8f4650"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <circle cx="700" cy="300" r="180" fill="#8f4650" opacity="0.25" filter="url(#blur)"/><text x="600" y="400" font-family="serif" font-size="48" fill="#e8d5b0" opacity="0.9" text-anchor="middle" dominant-baseline="middle">Small Rituals</text>
</svg>