<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ever After — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/admin.css">
</head>
<body>
  <div id="app">
    <section class="login" id="login-view">
      <div class="login__card">
        <h1 class="login__title">Ever After Admin</h1>
        <p class="login__hint">Demo: demo@everafter.app / DemoPass123!</p>
        <form id="login-form" class="login__form">
          <input type="email" id="email" placeholder="Email" required>
          <input type="password" id="password" placeholder="Password" required>
          <button type="submit">Sign In</button>
          <p class="login__error" id="login-error"></p>
        </form>
      </div>
    </section>

    <div class="dashboard hidden" id="dashboard-view">
      <aside class="sidebar">
        <div class="sidebar__brand">Ever After</div>
        <nav class="sidebar__nav">
          <button data-tab="profile" class="is-active">Profile</button>
          <button data-tab="content">Content</button>
          <button data-tab="theme">Theme</button>
          <button data-tab="preview">Preview</button>
        </nav>
        <button class="sidebar__logout" id="logout-btn">Logout</button>
      </aside>

      <main class="main">
        <header class="topbar">
          <h2 id="page-title">Profile</h2>
          <a href="../index.html" target="_blank" class="btn btn--secondary">Open Website</a>
        </header>

        <section class="tab is-active" id="tab-profile">
          <form id="profile-form" class="form">
            <div class="form__group">
              <label>Partner 1</label>
              <input type="text" id="partner1" required>
            </div>
            <div class="form__group">
              <label>Partner 2</label>
              <input type="text" id="partner2" required>
            </div>
            <div class="form__group">
              <label>Wedding Date</label>
              <input type="date" id="weddingDate" required>
            </div>
            <div class="form__group">
              <label>Slug</label>
              <input type="text" id="slug" required>
            </div>
            <div class="form__group form__group--full">
              <label>Love Story</label>
              <textarea id="loveStory" rows="4"></textarea>
            </div>
            <div class="form__actions">
              <button type="submit" class="btn">Save Profile</button>
            </div>
          </form>
        </section>

        <section class="tab" id="tab-content">
          <div class="panel">
            <h3>Section Visibility</h3>
            <div class="toggles" id="section-toggles"></div>
          </div>
          <div class="panel">
            <h3>Memories</h3>
            <div id="memories-list" class="list"></div>
            <button class="btn btn--small" id="add-memory">+ Add Memory</button>
          </div>
          <div class="panel">
            <h3>Gallery</h3>
            <div id="gallery-list" class="list"></div>
            <button class="btn btn--small" id="add-gallery">+ Add Photo</button>
          </div>
        </section>

        <section class="tab" id="tab-theme">
          <div class="panel">
            <h3>Theme Preset</h3>
            <select id="theme-select">
              <option value="burgundy-gold">Burgundy & Gold</option>
              <option value="midnight-rose">Midnight Rose</option>
              <option value="ivory-garden">Ivory Garden</option>
            </select>
          </div>
          <div class="panel">
            <h3>Music</h3>
            <input type="file" id="music-upload" accept="audio/*">
          </div>
        </section>

        <section class="tab" id="tab-preview">
          <div class="preview">
            <p>Preview your website as visitors will see it.</p>
            <a href="../index.html" target="_blank" class="btn">Launch Preview</a>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="src/js/app.js"></script>
</body>
</html>
